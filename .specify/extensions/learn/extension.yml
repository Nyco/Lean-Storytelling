schema_version: "1.0"

extension:
  id: "learn"
  name: "Learning Extension"
  version: "1.0.0"
  description: "Generate educational guides from implementations and enhance clarifications with mentoring context"
  author: "Vianca Martinez"
  repository: "https://github.com/imviancagrace/spec-kit-learn"
  homepage: "https://github.com/imviancagrace/spec-kit-learn"
  license: "MIT"

requires:
  speckit_version: ">=0.1.0"
  commands:
    - "speckit.specify"
    - "speckit.implement"

provides:
  commands:
    - name: "speckit.learn.review"
      file: "commands/learn.md"
      description: "Generate a concise educational guide explaining the technical decisions, patterns, and concepts applied during feature implementation"

    - name: "speckit.learn.clarify"
      file: "commands/clarify.md"
      description: "Clarify spec ambiguities with pros/cons analysis, recommendations, and mentoring context that builds senior-level thinking"

hooks:
  after_implement:
    command: "speckit.learn.review"
    optional: true
    prompt: "Generate a learning guide from this implementation?"

tags:
  - "learning"
  - "education"
  - "mentoring"
  - "knowledge-transfer"
